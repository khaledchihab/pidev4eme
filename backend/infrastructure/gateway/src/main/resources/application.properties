spring.application.name=gateway
server.port=8888

# Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Enable service discovery for routes
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8761,http://localhost:8887,http://localhost:8886}
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=Content-Type,Authorization
spring.cloud.gateway.globalcors.corsConfigurations.[/**].exposedHeaders=Content-Type,Authorization
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH

eureka.instance.preferIpAddress=true

management.endpoints.web.exposure.include=*

# Explicit routes for migration strangler pattern
# Route 1: Authentication service (highest priority - most specific paths)
spring.cloud.gateway.routes[0].id=authentication-service
spring.cloud.gateway.routes[0].uri=http://localhost:8885
spring.cloud.gateway.routes[0].predicates[0]=Path=/mobility/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# Route 2: Mobility monolith (catch-all for business logic during migration)
spring.cloud.gateway.routes[1].id=mobility-monolith
spring.cloud.gateway.routes[1].uri=http://localhost:8090
spring.cloud.gateway.routes[1].predicates[0]=Path=/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0