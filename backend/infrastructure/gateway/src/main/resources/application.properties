spring.application.name=gateway
server.port=8888

# Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Enable service discovery for routes
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8761,http://localhost:8887,http://localhost:8886}
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=Content-Type,Authorization
spring.cloud.gateway.globalcors.corsConfigurations.[/**].exposedHeaders=Content-Type,Authorization
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH

eureka.instance.preferIpAddress=true

management.endpoints.web.exposure.include=*

# ==============================================================================
# SINGLE SOURCE OF TRUTH: MOBILITY MONOLITH
# ==============================================================================
# Authentication-service is DEPRECATED and disabled.
# All requests route to mobility-monolith (port 8090) exclusively.
# 
# Resolution date: 2026-01-26
# Authority: Conflict Resolution Plan
# ==============================================================================

# Route 0: Mobility monolith (ONLY ACTIVE ROUTE)
spring.cloud.gateway.routes[0].id=mobility-monolith
spring.cloud.gateway.routes[0].uri=http://localhost:8090
spring.cloud.gateway.routes[0].predicates[0]=Path=/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0