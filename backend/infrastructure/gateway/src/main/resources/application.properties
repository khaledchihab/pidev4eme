spring.application.name=gateway
server.port=8888

# Eureka config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Enable service discovery for routes
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# CORS configuration
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8761,http://localhost:8885,http://localhost:8090}
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=Content-Type,Authorization
spring.cloud.gateway.globalcors.corsConfigurations.[/**].exposedHeaders=Content-Type,Authorization
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

eureka.instance.preferIpAddress=true

management.endpoints.web.exposure.include=*

# ==============================================================================
# MICROSERVICES ROUTING
# ==============================================================================
# Route 0: Authentication-service (auth, users, roles, passwords)
# Context path /mobility is handled by the auth-service itself
spring.cloud.gateway.routes[0].id=authentication-service
spring.cloud.gateway.routes[0].uri=http://localhost:8885
spring.cloud.gateway.routes[0].predicates[0]=Path=/mobility/**

# Route 1: Mobility monolith (forms, universities, applications, etc.)
spring.cloud.gateway.routes[1].id=mobility-monolith
spring.cloud.gateway.routes[1].uri=http://localhost:8090
spring.cloud.gateway.routes[1].predicates[0]=Path=/**