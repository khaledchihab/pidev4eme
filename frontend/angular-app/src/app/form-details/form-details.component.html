<div class="with-sidebar-margin">
<div class="container py-4">
  <div class="row mb-3">
    <div class="col-12">
      <h2 *ngIf="moyennes.length > 0" class="mb-3">
        List of Students that filled the Form: 
        <span class="text-primary">{{ moyennes[0].form.formName }}</span>
      </h2>
    </div>
  </div>
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <ul class="list-group mb-3">
            <li *ngFor="let moyenne of moyennes" class="list-group-item d-flex justify-content-between align-items-center">
              <span>
                <strong>Student:</strong> 
                {{ usersMap[moyenne.userId]?.username || 'Unknown User' }}
              </span>
              <span class="badge bg-success rounded-pill">
                Score: {{ moyenne.moyenne }}
              </span>
            </li>
          </ul>
          <div class="d-grid gap-2">
            <button class="btn btn-primary" (click)="onSendEmailsButtonClick()">Send Emails</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
