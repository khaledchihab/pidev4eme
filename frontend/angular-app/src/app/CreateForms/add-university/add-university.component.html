<div class="main-content-area">
  <div class="page-header-vibrant">
    <div class="container-fluid-custom">
      <h1>Ajouter une Nouvelle Université 🏢</h1>
      <p class="lead">Remplissez les détails ci-dessous pour ajouter une nouvelle université au système.</p>
    </div>
  </div>

  <div class="form-card-container">
    <div class="form-card-wrapper">
      <div class="card-header-vibrant">
        <h5 class="card-title-vibrant">Veuillez remplir ce formulaire avec des informations précises</h5>
      </div>
      <div class="card-body-vibrant">
        <form (ngSubmit)="onSubmit()" #universityForm="ngForm">
          <div class="form-group">
            <label for="name" class="form-label">Nom de l'Université</label>
            <div class="input-container">
              <i class="ri-building-line"></i>
              <input type="text" id="name" name="name" [(ngModel)]="university.name" class="form-control" placeholder="Entrez le nom de l'université" required>
            </div>
          </div>
          <div class="form-group">
            <label for="location" class="form-label">Localisation</label>
            <div class="input-container">
              <i class="ri-map-pin-line"></i>
              <input type="text" id="location" name="location" [(ngModel)]="university.location" class="form-control" placeholder="Entrez la localisation" required>
            </div>
          </div>
          <div class="submit-button-container">
            <button type="submit" class="submit-button" [disabled]="!universityForm.form.valid">Soumettre</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
