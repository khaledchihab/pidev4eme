<div class="main-content-area">
  <div class="page-header-vibrant">
    <div class="container-fluid-custom">
      <h1>Ajouter un nouveau formulaire 📝</h1>
      <p class="lead">Remplissez les informations ci-dessous pour créer un nouveau formulaire de mobilité.</p>
    </div>
  </div>

  <div class="form-card-container">
    <div class="form-card-wrapper">
      <div class="card-header-vibrant">
        <h5 class="card-title-vibrant">Veuillez remplir ce formulaire avec des informations précises</h5>
      </div>
      <div class="card-body-vibrant">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="universityId" class="form-label">Université</label>
            <div class="input-container">
              <i class="ri-government-line"></i>
              <select id="universityId" class="form-select" formControlName="universityId">
                <option value="" disabled selected>Choisir une université</option>
                <option *ngFor="let university of universities" [value]="university.universityId">
                  {{ university.name }}
                </option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="formName" class="form-label">Nom du formulaire</label>
            <div class="input-container">
              <i class="ri-file-text-line"></i>
              <input type="text" id="formName" class="form-control" formControlName="formName" placeholder="Entrez le nom du formulaire">
            </div>
          </div>
          <div class="form-group">
            <label for="description" class="form-label">Description</label>
            <div class="input-container">
              <i class="ri-file-info-line"></i>
              <textarea id="description" class="form-control" formControlName="description" rows="3" placeholder="Entrez la description"></textarea>
            </div>
          </div>
          <div class="form-group">
            <label for="placesDisp" class="form-label">Places disponibles</label>
            <div class="input-container">
              <i class="ri-group-line"></i>
              <input type="number" id="placesDisp" class="form-control" formControlName="placesDisp" min="1" placeholder="Nombre de places">
            </div>
          </div>
          <div class="form-group">
            <label for="datelimite" class="form-label">Date limite</label>
            <div class="input-container">
              <i class="ri-calendar-line"></i>
              <input type="date" id="datelimite" class="form-control" formControlName="datelimite">
            </div>
          </div>
          <div class="submit-button-container">
            <button type="submit" class="submit-button" [disabled]="form.invalid">Soumettre</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
